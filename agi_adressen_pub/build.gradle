import ch.so.agi.gretl.tasks.*
import ch.so.agi.gretl.api.TransferSet

defaultTasks 'updateSearchIndex'

task transferAgiAdressenEdit(type: Db2Db){
    sourceDb = [dbUriEdit, dbUserEdit, dbPwdEdit]
    targetDb = [dbUriPub, dbUserPub, dbPwdPub]
    transferSets = [
            new TransferSet('agi_adressen_pub_verbindungslinie_strasse_hausnummer.sql',
                    'agi_adressen_pub_v2.adressen_verbindungslinie_strasse_hausnummer', true),
            new TransferSet('agi_adressen_pub_benanntes_gebiet.sql', 'agi_adressen_pub_v2.adressen_benanntes_gebiet', true)
    ];
}

task transferAgiAdressenPub(type: Db2Db){
    dependsOn "transferAgiAdressenEdit"
    sourceDb = [dbUriPub, dbUserPub, dbPwdPub]
    targetDb = [dbUriPub, dbUserPub, dbPwdPub]
    transferSets = [
            new TransferSet('agi_adressen_pub_strassenachse.sql', 'agi_adressen_pub_v2.adressen_strassenachse', true)
    ];
}

task updateSearchIndex(type: SqlExecutor){
    dependsOn 'transferAgiAdressenPub'
    def layerName = 'ch.so.agi.gebaeudeadressen.strassenachse_suche'

    database = [dbUriPub, dbUserPub, dbPwdPub]
    def dbSearchSchema = dbSearchSchemaPub

    String layerNameString = "'${layerName}'"
    sqlParameters = [
            [layername: layerNameString, db_schema: dbSearchSchema]
    ]
    sqlFiles = [
            '../searchindex_deleteFeatures.sql',
            'searchindex_' + layerName + '.sql'
    ]
    doFirst {
        println 'layer name: ' + layerName
    }
}
