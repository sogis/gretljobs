import ch.so.agi.gretl.tasks.*
import ch.so.agi.gretl.api.TransferSet

defaultTasks 'transferAgiAdressen'

task transferAgiAdressen(type: Db2Db){
    sourceDb = [dbUriEdit, dbUserEdit, dbPwdEdit]
    targetDb = [dbUriPub, dbUserPub, dbPwdPub]
    transferSets = [
            new TransferSet('agi_adressen_pub_verbindungslinie_strasse_hausnummer.sql',
                    'agi_adressen_pub_v1.adressen_verbindungslinie_strasse_hausnummer', true),
            new TransferSet('agi_adressen_pub_benanntes_gebiet.sql', 'agi_adressen_pub_v1.adressen_benanntes_gebiet', true)
    ];
}
