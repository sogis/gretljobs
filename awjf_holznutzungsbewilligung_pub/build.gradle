import ch.so.agi.gretl.tasks.*
import ch.so.agi.gretl.api.TransferSet
import java.nio.file.Paths

apply plugin: 'ch.so.agi.gretl'
apply plugin: 'org.hidetake.ssh'

defaultTasks 'updateDispnamesInPub', 'uploadZip'

// Definition von Variablen
String tmpDir = buildDir.toString()

String sftpEnvironment = 'prod'

String waldportalZipFileName = 'holznutzungsbewilligungen_so_latest.zip'
String waldportalZipFilePath = Paths.get(tmpDir, waldportalZipFileName).toString()
String waldportalXtfFileName = "SO_holznutzungsbewilligungen_${sftpEnvironment}.xtf"
String waldportalXtfFilePath = Paths.get(tmpDir, waldportalXtfFileName).toString()

String editXtfFileName = 'SO_holznutzungsbewilligungen_edit.xtf'
String editXtfFilePath = Paths.get(tmpDir, editXtfFileName).toString()

String exportXtfFileName = 'SO_holznutzungsbewilligungen_export.xtf'
String exportXtfFilePath = Paths.get(tmpDir, exportXtfFileName).toString()
String exportZipFileName = 'SO_holznutzungsbewilligungen_export.zip'
String exportZipFilePath = Paths.get(tmpDir, exportZipFileName).toString()

String dbSchema = 'awjf_holznutzungsbewilligung_v1'
String dbSchemaStaging = 'awjf_holznutzungsbewilligung_staging_v1'

String iliModel = 'Holznutzungsbewilligung_V1_0'
String aiTopic = iliModel.toLowerCase()

// Definition der Zugangsdaten für den Waldportal-SFTP-Server
remotes {
    sftpServer {
        host = sftpServerWaldportal
        user = sftpUserWaldportal
        password = sftpPwdWaldportal
        // Skip host key checking outside the following environments:
        if (!(gretlEnvironment in ['test', 'integration', 'production'])) { // uses the Groovy membership operator
            knownHosts = allowAnyHosts
        }
    }
}

tasks.register('exportEdit', Ili2pgExport) {
    group = 'updateStaging'
    description = 'Export der manuell erfassten Holznutzungsbewilligungen aus dem Erfassungsschema'

    database = [dbUriEdit, dbUserEdit, dbPwdEdit]
    dbschema = dbSchema
    models = iliModel
    dataFile = files(editXtfFilePath)
    exportTid = true
}

tasks.register('downloadWaldportalZip') {
    group = 'updateStaging'
    description = 'ZIP-Datei vom Waldportal-SFTP-Server herunterladen'

    // build-Ordner (tmpDir) anlegen, falls nicht existierend
    doFirst {
        buildDir.mkdirs()
    }

    doLast {
        ssh.run {
            session(remotes.sftpServer) {
                get from: "${sftpEnvironment}/holznutzungsbewilligungen/${waldportalZipFileName}", into: waldportalZipFilePath
            }
        }
        println 'ZIP-Datei vom Waldportal-SFTP-Server heruntergeladen.'
    }
}

tasks.register('unzipWaldportalXtf', Copy) {
    group = 'updateStaging'
    dependsOn 'downloadWaldportalZip'
    description = 'XTF-Datei aus dem ZIP-Archiv extrahieren'

    from zipTree(waldportalZipFilePath)
    into tmpDir
}

tasks.register('deleteFromStaging', SqlExecutor) {
    group = 'updateStaging'
    description = 'Staging-Schema leeren'

    database = [dbUriEdit, dbUserEdit, dbPwdEdit]
    sqlFiles = files('delete_staging_tables.sql')
}

tasks.register('importEditToStaging', Ili2pgImport) {
    group = 'updateStaging'
    dependsOn 'exportEdit', 'deleteFromStaging'
    description = 'Import der manuell erfassten Holznutzungsbewilligungen in das Staging-Schema'

    database = [dbUriEdit, dbUserEdit, dbPwdEdit]
    dbschema = dbSchemaStaging
    models = iliModel
    dataFile = files(editXtfFilePath)
    importTid = true
    disableValidation = true  // wird bereits beim Export validiert
}

tasks.register('importWaldportalToStaging', Ili2pgImport) {
    group = 'updateStaging'
    dependsOn 'importEditToStaging', 'unzipWaldportalXtf'
    description = 'Import der Holznutzungsbewilligungen vom Waldportal in das Staging-Schema'

    database = [dbUriEdit, dbUserEdit, dbPwdEdit]
    dbschema = dbSchemaStaging
    models = iliModel
    topics = 'Holznutzungsbewilligung_V1_0.Holznutzung'  // ansonsten wird der leere Codelisten-Basket importiert
    dataFile = files(waldportalXtfFilePath)
    importTid = true
}

tasks.register('copyStagingToPub', Db2Db) {
    group = 'updatePub'
    dependsOn 'importWaldportalToStaging'
    description = 'Daten vom MGDM in das Publikationsschema überführen'

    sourceDb = [dbUriEdit, dbUserEdit, dbPwdEdit]
    targetDb = [dbUriPub, dbUserPub, dbPwdPub]
    transferSets = [
        new TransferSet('select_holznutzungsbewilligungen.sql', 'awjf_holznutzungsbewilligung_pub_v1.holznutzung_holznutzungsbewilligung', true)
    ]
}

tasks.register('updateDispnamesInPub', SqlExecutor) {
    group = 'updatePub'
    dependsOn 'copyStagingToPub'
    description = 'Für die Darstellung im WGC den <dispname> von Enumerationen nach <attribut>_txt schreiben'

    database = [dbUriPub, dbUserPub, dbPwdPub]
    sqlFiles = files('update_dispnames.sql')
}

tasks.register('exportStaging', Ili2pgExport) {
    group = 'updateGeodienste'
    dependsOn 'importWaldportalToStaging'
    description = 'Export der zusammengeführten Holznutzungsbewilligungen aus dem Staging-Schema'

    database = [dbUriEdit, dbUserEdit, dbPwdEdit]
    dbschema = dbSchemaStaging
    models = iliModel
    topics = 'Holznutzungsbewilligung_V1_0.Holznutzung'
    dataFile = files(exportXtfFilePath)
}

tasks.register('zipXtf', Zip) {
    group = 'updateGeodienste'
    dependsOn 'exportStaging'
    description = 'Zippen der zusammengeführten Holznutzungsbewilligungen aus dem Staging-Schema'

    from tmpDir
    include exportXtfFileName
    archiveName exportZipFileName
    destinationDir(file(tmpDir))
}

tasks.register('uploadZip') {
    group = 'updateGeodienste'
    dependsOn 'zipXtf'
    description = 'ZIP-Datei vom Waldportal nach geodienste.ch übertragen und publizieren'

    String aiLogin = "${aiUser}:${aiPwd}"
    String aiUrl = "https://${aiServer}/data_agg/interlis/import"

    doLast {
        def response = [
            'curl', 
            '--user', aiLogin, 
            '--form', "topic=${aiTopic}",
            '--form', "lv95_file=@${exportZipFilePath}", 
            '--form', 'publish=true', 
            '--form', 'replace_all=false', 
            aiUrl
        ].execute().text

        if (response.contains('false')
                || response.contains('DOCTYPE html')
                || response == null
                || response.trim().isEmpty()
            ) {
            throw new GradleException("Upload zu geodienste.ch fehlgeschlagen: $response")
        } else {
            println(response)
        }
    }
}