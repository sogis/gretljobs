import ch.so.agi.gretl.tasks.*
import ch.so.agi.gretl.api.TransferSet

apply plugin: 'ch.so.agi.gretl'

defaultTasks 'publish'

tasks.register('unzip', Copy) {
    from {
        zipTree('xyz.zip')
    }
    into layout.buildDirectory
}

tasks.register('sqlPrep', SqlExecutor) {
    dependsOn unzip
    database = [dbUriEdit, dbUserEdit, dbPwdEdit]
    sqlParameters = [anlage_id:anlageId]
    sqlFiles = files(
        'id_record.sql',
        'delete_previous_import.sql'
        )
}

tasks.register('importCells', ShpImport) {
    dependsOn sqlPrep
    database = [dbUriEdit, dbUserEdit, dbPwdEdit]
    schemaName = "afu_schiesslaerm_v1"
    tableName = "schiesslaerm_import"
    dataFile = file("$buildDir/shape.shp")
}

tasks.register('publish'){
    dependsOn importCells
}

