tasks.register("preprocess", SqlExecutor) {
    database = [dbUriDuckDB]
    sqlFiles = files(
        'load_extensions.sql',
        'bln_swisstopo.sql'
    )
    sqlParameters = [connectionStringPub : dbConnectionStringPub as String]
}
 
def gemeinden = [2401,2402,2403,2404,2405,2406,2407,2408,2421,2422,2424,2425,2426,2427,2428,2430,2445,2455,2457,2461,2463,2464,2465,2471,2472,2473,2474,2475,2476,2477,2478,2479,2480,2481,2491,2492,2493,2495,2497,2499,2500,2501,2502,2503,2511,2513,2514,2516,2517,2518,2519,2523,2524,2525,2526,2527,2528,2530,2532,2534,2535,2541,2542,2543,2544,2545,2546,2547,2548,2549,2550,2551,2553,2554,2555,2556,2571,2572,2573,2574,2575,2576,2578,2579,2580,2581,2582,2583,2584,2585,2586,2601,2611,2612,2613,2614,2615,2616,2617,2618,2619,2620,2621,2622]

//def gemeinden = [2401, 2601]

gemeinden.each { gemeinde ->
    task "calculate_$gemeinde"(type: SqlExecutor) {
        dependsOn "preprocess"
        database = [dbUriDuckDB]
        sqlFiles = files(
            'load_extensions.sql',
            'attach_pubdb.sql',
            'delete.sql',
            'main.sql'
        )
        sqlParameters = [connectionStringPub : dbConnectionStringPub as String, bfsnr : gemeinde as String]
    }
}

tasks.register('calculate') {
    description = "Sql aggregation task."
    dependsOn {
        tasks.findAll { task -> task.name.startsWith('calculate_') }
    }
}

tasks.register("postprocess", SqlExecutor) {
    dependsOn "calculate"
    database = [dbUriDuckDB]
    sqlFiles = files(
        'detach_pubdb.sql'
    )
    sqlParameters = [connectionStringPub : dbConnectionStringPub as String]
}
