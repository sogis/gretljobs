tasks.register("exportData", Ili2pgExport) {
    //dependsOn "validation"
    dependsOn 'publikation'
    description = "Exportiert die Daten nach INTERLIS."
    database = [dbUriProcessing, dbUserProcessing, dbPwdProcessing]
    models = "SO_AFU_Bodeneinheiten_Publikation_20260106"
    dbschema = "afu_bodeneinheiten_pub_v1"
    dataFile = files("Bodeneinheiten.xtf")
    disableValidation = true
}

tasks.register("importBodeneinheitenPub", Ili2pgImport) {
    dependsOn "exportData"
    description = "Import der Bodeneinheiten in die Pub-DB"
    database = [dbUriPub, dbUserPub, dbPwdPub]
    models = "SO_AFU_Bodeneinheiten_Publikation_20260106"
    dbschema = "afu_bodeneinheiten_pub_v1"
    dataFile = files("Bodeneinheiten.xtf")
    disableValidation = true
}