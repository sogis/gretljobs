import ch.so.agi.gretl.tasks.*
import ch.so.agi.gretl.api.TransferSet
import java.nio.file.Paths

apply plugin: 'ch.so.agi.gretl'

defaultTasks 'uploadXtfMGDM'

def fileNameMGDM = "afu_gewaesserschutz_mgdm.xtf"
def fileNameMGDMZip = "afu_gewaesserschutz_mgdm.zip"

def aiLogin = aiUser + ":" + aiPwd

task transferGewaesserschutz(type: Db2Db) {
    sourceDb = [dbUriEdit, dbUserEdit, dbPwdEdit]
    targetDb = [dbUriPub, dbUserPub, dbPwdPub]
    transferSets = [
        new TransferSet('gewaesserschutz_gewaesserschutzbereich.sql', 'afu_gewaesserschutz_pub_v3.gewaesserschutz_gewaesserschutzbereich', true),
        new TransferSet('gewaesserschutz_zustroembereich.sql', 'afu_gewaesserschutz_pub_v3.gewaesserschutz_zustroembereich', true),
    ];
}

task publishPub(type: Publisher) {
    dependsOn 'transferGewaesserschutz'
    database = [dbUriPub, dbUserPub, dbPwdPub]
    dataIdent = "ch.so.afu.gewaesserschutz"
    dbSchema = "afu_gewaesserschutz_pub_v3"
    modelsToPublish = "SO_AFU_Gewaesserschutz_Publikation_20240606"
    userFormats = true
    target = [sftpUrlSogis, sftpUserSogis, sftpPwdSogis]
    kgdiService = [simiMetadataServiceUrl, simiMetadataServiceUser, simiMetadataServicePwd]
    kgdiTokenService = [simiTokenServiceUrl, simiTokenServiceUser, simiTokenServicePwd]
    grooming = new File(file(projectDir).getParentFile(), "publisher_grooming.json")
    if (findProperty('ilivalidatorModeldir')) modeldir = ilivalidatorModeldir
}

/** MGDM planerischer Gewässerschutz v1.2
* --------------------------------------- */

/**
 * Kopiert hier die Daten aus dem Schema afu_gewaesserschutz_bereiche in das MGDM-Schema afu_gewaesserschutz_bereiche_mgdm_v1. 
 * Diese Daten werden anschliessend im Task exportDataMGDM_V1_2 exportiert und an geodienste.ch weitergeleitet.
 */
task transferGewaesserschutzMGDM_V1_2 (type: Db2Db) {
    dependsOn 'publishPub'
    description = "Exportiert die Daten aus dem Schema afu_grundwasserschutz_bereiche in das MGDM-Schema V1.2."
    sourceDb = [dbUriEdit, dbUserEdit, dbPwdEdit]
    targetDb = [dbUriEdit, dbUserEdit, dbPwdEdit]
    transferSets = [
        new TransferSet('gewaesserschutz_gewaesserschutzbereich_mgdm.sql', 'afu_gewaesserschutz_bereiche_mgdm_v1.gsbereiche_gsbereich', true)
    ];
}

/**
 * Exportiere hier die Daten aus dem Schema afu_gewaesserschutz_bereiche_mgdm_v1. Diese Daten werden
 * anschliessend im Task validateDataMGDM validiert, dann gezippt und an geodienste.ch weitergeleitet.
 */
task exportDataMGDM_V1_2 (type: Ili2pgExport) {
    dependsOn 'transferGewaesserschutzMGDM_V1_2'
    description = "Exportiert die Daten aus dem Schema afu_gewaesserschutz_bereiche_mgdm in eine INTERLIS-Datei."
    database = [dbUriEdit, dbUserEdit, dbPwdEdit]
    dbschema = 'afu_gewaesserschutz_bereiche_mgdm_v1'
    models = 'PlanerischerGewaesserschutz_V1_2'
    dataFile= file(fileNameMGDM)
    disableValidation = true
}

/**
 * Validiere die exportierten Daten aus dem Schema afu_gewaesserschutz_bereiche_mgdm_v1. Wir können hier nicht
 * Ili2pgValidate, da die Daten sowieso exportiert werden müssen.
 */
task validateDataMGDM(type: IliValidator) {
    dependsOn 'exportDataMGDM_V1_2'
    description = "Validiert die exportierten INTERLIS-Datei gegen das Modell."
    dataFiles = file(fileNameMGDM)
    if (findProperty('ilivalidatorModeldir')) modeldir = ilivalidatorModeldir
    failOnError = true
}

task zipXtfMGDM(type: Zip) {
    dependsOn 'validateDataMGDM'
    from "."
    include fileNameMGDM
    archiveName fileNameMGDMZip
    destinationDir(file("."))
}

/* Falls man auf geodienste.ch alles löschen will/muss (siehe zweiter Abschnitt), muss man
* einmalig replace_all=true setzen. Curl-Befehl kann natürlich auch lokal
* ausgeführt werden.
*
* Achtung: Die Dateinamen müssen immer gleich sein. Diese werden als 
* dataset-Name verwendet. Will man die Namen ändern, siehe erster Abschnitt
* des Kommentars.
*/
task uploadXtfMGDM() {
    dependsOn 'zipXtfMGDM'
    doLast {
        def response = ["curl", "-u", aiLogin, "-F", "topic=planerischer_gewaesserschutz_v1_2", "-F",
                        "lv95_file=@" + Paths.get(".", fileNameMGDMZip), "-F", "publish=true", "-F", "replace_all=false",
                        "https://" + aiServer + "/data_agg/interlis/import"].execute().text
        println(response)
        if (response.contains("false") || response == null || response.trim().isEmpty()) {
            throw new GradleException()
        }
    }
}
