import ch.so.agi.gretl.tasks.*
import ch.so.agi.gretl.api.TransferSet

apply plugin: 'ch.so.agi.gretl'

defaultTasks 'Pruefperimeter_Bodenabtrag'

tasks.register('transferAfuSchadstoffbelastetBoeden', Db2Db) {
    sourceDb = [dbUriEdit, dbUserEdit, dbPwdEdit]
    targetDb = [dbUriPub, dbUserPub, dbPwdPub]
    transferSets = [
    new TransferSet(
                    'to_pub_db/afu_schadstoffbelastete_boeden_pub_schdstfflstt_bden_rebbau.sql',
                    'afu_schadstoffbelastete_boeden_pub_v1.schdstfflstt_bden_rebbau',
                    true
            ),
            new TransferSet(
                    'to_pub_db/afu_schadstoffbelastete_boeden_pub_schdstfflstt_bden_hopfenbau.sql',
                    'afu_schadstoffbelastete_boeden_pub_v1.schdstfflstt_bden_hopfenbau',
                    true
            ),
            new TransferSet(
                    'to_pub_db/afu_schadstoffbelastete_boeden_pub_schdstfflstt_bden_bodenbelastungsgebiet.sql',
                    'afu_schadstoffbelastete_boeden_pub_v1.schdstfflstt_bden_bodenbelastungsgebiet',
                    true
            ),
            new TransferSet(
                    'to_pub_db/afu_schadstoffbelastete_boeden_pub_schdstfflstt_bden_eisenbahn.sql',
                    'afu_schadstoffbelastete_boeden_pub_v1.schdstfflstt_bden_eisenbahn',
                    true
            ),
            new TransferSet(
                    'to_pub_db/afu_schadstoffbelastete_boeden_pub_schdstfflstt_bden_flugplatz.sql',
                    'afu_schadstoffbelastete_boeden_pub_v1.schdstfflstt_bden_flugplatz',
                    true
            ),
            new TransferSet(
                    'to_pub_db/afu_schadstoffbelastete_boeden_pub_schdstfflstt_bden_schrebergarten.sql',
                    'afu_schadstoffbelastete_boeden_pub_v1.schdstfflstt_bden_schrebergarten',
                    true
            ), 
            new TransferSet(
                    'to_pub_db/afu_schadstoffbelastete_boeden_pub_schdstfflstt_bden_gaertnerei.sql',
                    'afu_schadstoffbelastete_boeden_pub_v1.schdstfflstt_bden_gaertnerei',
                    true
            ),
            new TransferSet(
                    'to_pub_db/afu_schadstoffbelastete_boeden_pub_schdstfflstt_bden_geogene_bodenbelastung.sql',
                    'afu_schadstoffbelastete_boeden_pub_v1.schdstfflstt_bden_geogene_bodenbelastung',
                    true
            ),
            new TransferSet(
                    'to_pub_db/afu_schadstoffbelastete_boeden_pub_schdstfflstt_bden_militaerischer_schiessplatz.sql',
                    'afu_schadstoffbelastete_boeden_pub_v1.schdstfflstt_bden_militaerischer_schiessplatz',
                    true
            ),
            new TransferSet(
                    'to_pub_db/afu_schadstoffbelastete_boeden_pub_schdstfflstt_bden_schiessanlage.sql',
                    'afu_schadstoffbelastete_boeden_pub_v1.schdstfflstt_bden_schiessanlage',
                    true
            ),
            new TransferSet(
                    'to_pub_db/afu_schadstoffbelastete_boeden_pub_schdstfflstt_bden_siedlungsgebiet.sql',
                    'afu_schadstoffbelastete_boeden_pub_v1.schdstfflstt_bden_siedlungsgebiet',
                    true
            ),
            new TransferSet(
                    'to_pub_db/afu_schadstoffbelastete_boeden_pub_schdstfflstt_bden_stahlbruecke.sql',
                    'afu_schadstoffbelastete_boeden_pub_v1.schdstfflstt_bden_stahlbruecke',
                    true
            ),
            new TransferSet(
