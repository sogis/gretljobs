import ch.so.agi.gretl.tasks.*
import ch.so.agi.gretl.api.TransferSet

apply plugin: 'ch.so.agi.gretl'

description = "GRETL-Job für Datenübernahme und Validierung der Projektinformation edit-DB, pub-DB"

defaultTasks 'validateDataPub'

task validateData(type: Ili2pgValidate) {
    database = [dbUriEdit, dbUserEdit, dbPwdEdit]
    models = "SO_AGI_AV_Projektinformationen_20260323"
    dbschema = "agi_av_projektinformationen_v1"
}

task transferAgiProjektfinfoPub(type: Db2Db) {
    dependsOn validateData
    sourceDb = [dbUriEdit, dbUserEdit, dbPwdEdit]
    targetDb = [dbUriPub, dbUserPub, dbPwdPub]
    transferSets = [
            new TransferSet('transfer_data.sql',
                    'agi_av_projektinformationen_pub_v1.projektinformtnen_projekt', true)
    ]
}

task validateDataPub(type: Ili2pgValidate) {
    dependsOn transferAgiProjektfinfoPub
    database = [dbUriPub, dbUserPub, dbPwdPub]
    models = "SO_AGI_AV_Projektinformationen_Publikation_20260323"
    dbschema = "agi_av_projektinformationen_pub_v1"
}