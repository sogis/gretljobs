task transferAvtVerkehrszaehlstellen(type: Db2Db) {
    sourceDb = [dbUriEdit, dbUserEdit, dbPwdEdit]
    targetDb = [dbUriPub, dbUserPub, dbPwdPub]
    transferSets = [
            new TransferSet('staedtische_zaehlung.sql', 'avt_verkehrszaehlstellen_pub_v1.staedtische_verkehrszaehlung', true),
            new Transferset('zaehlstellen.sql', 'avt_verkehrszaehlstellen_pub_v1.verkehrszaehlstelle', true)          
    ]
}

