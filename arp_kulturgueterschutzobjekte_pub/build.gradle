import ch.so.agi.gretl.tasks.*
import ch.so.agi.gretl.api.TransferSet

apply plugin: 'ch.so.agi.gretl'

defaultTasks 'updateTxtColsKGS'

def tmpDir = buildDir.toString()
def xtfPath = tmpDir + "/data.xtf"

task exportXtf(type: Ili2pgExport){
    database = [dbUriEdit, dbUserEdit, dbPwdEdit]
    dbschema = "arp_kulturgueterschutzobjekte_v1"
    disableValidation = true
    dataFile = xtfPath
    models = "SO_ARP_Kulturgueterschutzobjekte_20260227"
}

task validate(type: IliValidator){
    dependsOn 'exportXtf' 
    dataFiles = [xtfPath]
    if (findProperty('ilivalidatorModeldir')) modeldir = ilivalidatorModeldir
}

task transferKGS(type: Db2Db){
    dependsOn 'validate' 
    sourceDb = [dbUriEdit, dbUserEdit, dbPwdEdit]
    targetDb = [dbUriPub, dbUserPub, dbPwdPub]
    transferSets = [
            new TransferSet('kulturgueterschutzobjekte_objekte.sql', 'arp_kulturgueterschutzobjekte_pub_v1.objekte', true),
    ];
}

task updateTxtColsKGS(type: SqlExecutor){
    dependsOn 'transferISOS' 
    description = "Füllt die _txt-Spalten ab"
    database = [dbUriPub, dbUserPub, dbPwdPub]
    sqlFiles = ['updateTxtColsKGS.sql']
}
