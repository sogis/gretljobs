/*
Import GELAN-Daten in die Edit-DB
*/
import ch.so.agi.gretl.tasks.*
import ch.so.agi.gretl.api.TransferSet
import java.nio.file.Paths


apply plugin: 'ch.so.agi.gretl'
apply plugin: 'org.hidetake.ssh'

defaultTasks 'transferALWAgrardaten', 'updateSearchIndex_1', 'updateSearchIndex_2', 'updateSearchIndex_3', 'updateSearchIndex_4', 'updateSearchIndex_5', 'updateSearchIndex_6', 'updateSearchIndex_7', 'updateSearchIndex_8'

def pathToTempFolder = System.getProperty("java.io.tmpdir")

remotes {
    sftpServer {
        host = "${sftpServerGelan}"
        user = "${sftpUserGelan}"
        password = "${sftpPwdGelan}"
        // Skip host key checking outside the following environments:
        if ( !(gretlEnvironment in ['test', 'integration', 'production']) ) { // uses the Groovy membership operator
            knownHosts = allowAnyHosts
        }
    }
}

task downloadData () {
    description = "Download file from SFTP server"
    doLast {
        ssh.run {
            session(remotes.sftpServer) {
                get from: "Prod/Export_ais_agrardaten.xtf", into: pathToTempFolder
            }
        }
        println "File downloaded from SFTP server"
    }
}

task checkDownloadedFileSize(dependsOn: downloadData) {
    description = "Check size of downloaded GELAN data file"
    doLast {
        def downloadedFile = file(Paths.get(pathToTempFolder, "Export_ais_agrardaten.xtf").toFile())
        if (!downloadedFile.exists()) {
            throw new GradleException("Erwartete Datei wurde nicht gefunden: ${downloadedFile}")
        }

        long minSizeBytes = 800L * 1024L * 1024L  // 800 MB
        if (downloadedFile.length() < minSizeBytes) {
            throw new GradleException(
                "Datei ist zu klein (${downloadedFile.length()} Bytes). " +
                "Erwartet mindestens ${minSizeBytes} Bytes (800 MB)."
            )
        }

        println "Dateigrösse OK: ${downloadedFile.length()} Bytes"
    }
}

task importGELAN(type: Ili2pgReplace, dependsOn: checkDownloadedFileSize) {
    description = 'Import resp. ersetzt täglich die GELAN-Daten (Topic: BFF_Qualitaet, Betriebsdaten_Strukturdaten, Datentransfer) in der Erfassungsdatenbank'
    database = [dbUriEdit, dbUserEdit, dbPwdEdit]
    dbschema = "alw_landwirtschaft_tierhaltung_v1"
    models = 'SO_ALW_Landwirtschaft_Tierhaltung_20210426'
    dataFile = Paths.get(pathToTempFolder, 'Export_ais_agrardaten.xtf').toFile()
    dataset = 'agrardaten'
}

task transferALWAgrardaten(type: Db2Db, dependsOn: importGELAN){
    description = "Datenumbau in das Publikationsmodell"
    sourceDb = [dbUriEdit, dbUserEdit, dbPwdEdit]
    targetDb = [dbUriPub, dbUserPub, dbPwdPub]
    sqlParameters = [publikationsjahr_standort: '2026', publikationsjahr_flaechenerhebung: '2026']
    transferSets = [
        new TransferSet("dataset.sql",'alw_landwirtschaft_tierhaltung_pub_v2.t_ili2db_dataset',true),
        new TransferSet("basket.sql",'alw_landwirtschaft_tierhaltung_pub_v2.t_ili2db_basket',true),
        new TransferSet("bff_qualitaet.sql",'alw_landwirtschaft_tierhaltung_pub_v2.bff_qualitaet_bff_qualitaet',true),
        new TransferSet("bewirtschaftungseinheit_aktuellesJahr.sql",'alw_landwirtschaft_tierhaltung_pub_v2.betrbsdttrktrdten_bewe_aktuellesjahr',true),
        new TransferSet("bewirtschaftungseinheit_anderesJahr.sql",'alw_landwirtschaft_tierhaltung_pub_v2.betrbsdttrktrdten_bewe_anderesjahr',true),
        new TransferSet("kultur_flaeche_aktuellesJahr.sql",'alw_landwirtschaft_tierhaltung_pub_v2.betrbsdttrktrdten_kultur_flaeche_aktuellesjahr',true),
        new TransferSet("kultur_flaeche_anderesJahr.sql",'alw_landwirtschaft_tierhaltung_pub_v2.betrbsdttrktrdten_kultur_flaeche_anderesjahr',true),
        new TransferSet("kultur_punkt_aktuellesJahr.sql",'alw_landwirtschaft_tierhaltung_pub_v2.betrbsdttrktrdten_kultur_punkt_aktuellesjahr',true),
        new TransferSet("kultur_punkt_anderesJahr.sql",'alw_landwirtschaft_tierhaltung_pub_v2.betrbsdttrktrdten_kultur_punkt_anderesjahr',true),
        new TransferSet("ln_soemmerung.sql",'alw_landwirtschaft_tierhaltung_pub_v2.ln_soemmerung_ln_soemmerung',true),
        new TransferSet("tierstandorte.sql",'alw_landwirtschaft_tierhaltung_pub_v2.betrbsdttrktrdten_tierstandort',true)
    ];
}

task updateSearchIndex_1(type: SqlExecutor){
    mustRunAfter 'transferALWAgrardaten'
    def layerName = 'ch.so.alw.bienenstandorte_und_sperrgebiete.bienenstandorte'
    def sqlFileName = 'searchindex_' + layerName + '.sql'
    //def sqlFileName = 'searchindex_' + layerName.replace('_geschuetzt', '') + '.sql'

    database = [dbUriPub, dbUserPub, dbPwdPub]
    def dbSearchSchema = dbSearchSchemaPub
    String layerNameString = "'${layerName}'"

    sqlParameters = [
            [layername: layerNameString, db_schema: dbSearchSchema]
    ]
    sqlFiles = [
            '../searchindex_deleteFeatures.sql',
            sqlFileName
    ]
    doFirst {
        println 'layer name: ' + layerName
    }
}

