import ch.so.agi.gretl.tasks.*
import ch.so.agi.gretl.api.TransferSet

apply plugin: 'ch.so.agi.gretl'

defaultTasks 'transfer'

tasks.register('transfer', Db2Db) {
    sourceDb = [dbUriEdit, dbUserEdit, dbPwdEdit]
    targetDb = [dbUriPub, dbUserPub, dbPwdPub]
    transferSets = [
        new TransferSet('transfer_region.sql', 'awa_energieberater_pub_v1.energieberater_region', true),
        new TransferSet('transfer_berater.sql', 'awa_energieberater_pub_v1.energieberater_berater', true)
    ];
}

