import java.util.Base64
import groovy.json.JsonSlurper
import java.net.http.HttpRequest
import java.net.http.HttpClient
import java.net.http.HttpResponse

/*
plugins {
    id "de.undercouch.download" version "5.6.0"
}

import ch.so.agi.gretl.tasks.*
import ch.so.agi.gretl.tasks.Curl.MethodType

apply plugin: 'ch.so.agi.gretl'
*/

defaultTasks 'download_json'

String clientId = "fuu";
String clientSecret = "bar";

def token = ""

task getToken(){
    description = "gets the access token based on client id and secret"
    doLast{
        HttpRequest request = HttpRequest.newBuilder()
            .uri(new URI("https://auth.infoflora.ch/oauth2/token"))
            .header("Content-Type", "application/x-www-form-urlencoded")
            .header("Authorization", "Basic " + Base64.getEncoder().encodeToString((clientId + ":" + clientSecret).getBytes()))
            .POST(HttpRequest.BodyPublishers.ofString("grant_type=client_credentials&client_id=" + clientId))
            .build();

        HttpClient client = HttpClient.newHttpClient();
        HttpResponse<String> response = client.send(request, HttpResponse.BodyHandlers.ofString()); 

        def body = response.body()    

        def slurper = new JsonSlurper();
        def slurped = slurper.parseText(body)

        if (slurped.access_token != null)
            token = slurped.access_token 

        if(token.length() == 0)
            throw new GradleException("Failed to retrieve access token")

        println "Length of access token is: " + token.length()
    }
}

task download_json(dependsOn: getToken){
    description = "Download Json with filename"

    doLast{
        println token

        HttpRequest request = HttpRequest.newBuilder()
            .uri(new URI("https://obs.infoflora.ch/rest/v4/docs.json?projects=83505"))
            .header("Authorization", "Bearer " + token)
            .GET()
            .build();

        HttpClient client = HttpClient.newHttpClient();
        HttpResponse<String> response = client.send(request, HttpResponse.BodyHandlers.ofString()); 

        println response.body()
    }
} 

