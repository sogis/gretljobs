tasks.register('copyDataFromEdit', Db2Db) {
    dependsOn 'createImportSchema_Hoheitsgrenzen'
    description = 'Quelldaten tabellenweise aus der Edit-DB in die Processing-DB kopieren.'
    sourceDb = [dbUriEdit, dbUserEdit, dbPwdEdit]
    targetDb = [dbUriProcessing, dbUserProcessing, dbPwdProcessing]
    transferSets = [
        new TransferSet('import_to_processing/import_waldplan_dataset.sql', 'awjf_waldplan_v2.t_ili2db_dataset', true),
        new TransferSet('import_to_processing/import_waldplan_basket.sql', 'awjf_waldplan_v2.t_ili2db_basket', true),
        new TransferSet('import_to_processing/import_waldplan_schutzwald.sql', 'awjf_waldplan_v2.waldplan_schutzwald', true),
        new TransferSet('import_to_processing/import_waldplankatalog_forstbetrieb.sql', 'awjf_waldplan_v2.waldplankatalog_forstbetrieb', true),
        new TransferSet('import_to_processing/import_waldplankatalog_forstrevier.sql', 'awjf_waldplan_v2.waldplankatalog_forstrevier', true),
        new TransferSet('import_to_processing/import_waldplan_waldfunktion.sql', 'awjf_waldplan_v2.waldplan_waldfunktion', true),
        new TransferSet('import_to_processing/import_waldplan_waldnutzung.sql', 'awjf_waldplan_v2.waldplan_waldnutzung', true),
        new TransferSet('import_to_processing/import_waldplan_waldeigentum.sql', 'awjf_waldplan_v2.waldplan_waldeigentum', true)
    ];
}

tasks.register('copyDataFromPub', Db2Db) {
    dependsOn 'copyDataFromEdit'
    description = 'Quelldaten tabellenweise aus der Pub-DB in die Processing-DB kopieren.'
    sourceDb = [dbUriPub, dbUserPub, dbPwdPub]
    targetDb = [dbUriProcessing, dbUserProcessing, dbPwdProcessing]
    transferSets = [
        new TransferSet('import_to_processing/import_waldplan_pub_dataset.sql', 'awjf_waldplan_pub_v2.t_ili2db_dataset', true),
        new TransferSet('import_to_processing/import_waldplan_pub_basket.sql', 'awjf_waldplan_pub_v2.t_ili2db_basket', true),
        new TransferSet('import_to_processing/import_mopublic_grundstueck.sql', 'agi_mopublic_pub.mopublic_grundstueck', true),
        new TransferSet('import_to_processing/import_hoheitsgrenzen_gemeindegrenze.sql', 'agi_hoheitsgrenzen_pub.hoheitsgrenzen_gemeindegrenze', true)
    ];
}

// ------------------------------------------------------------
// Loop über alle Gemeinden
// ------------------------------------------------------------
BfsNrGemeinden.each { bfs ->
    def xtfFile = files("${buildDir}/waldplan_${bfs}.xtf")

    // --------------------------------------------------------
    // Processing Daten
    // --------------------------------------------------------
    tasks.register("processingPubData_${bfs}", SqlExecutor) {
        dependsOn 'copyDataFromPub'
        database = [dbUriProcessing, dbUserProcessing, dbPwdProcessing]
        sqlParameters = [bfsnr_param: bfs.toString()]
        sqlFiles = files(
            'processing_data/01_awjf_schutzwald_processing.sql',
            'processing_data/02_awjf_waldfunktion_processing.sql',
            'processing_data/03_awjf_waldnutzung_processing.sql',
            'processing_data/04_awjf_waldplan_grundstueck_01_tabellen_erstellen_processing.sql',
            'processing_data/05_awjf_waldplan_grundstueck_02_grundstueck_processing.sql',
            'processing_data/06_awjf_waldplan_grundstueck_03_waldfunktion_waldnutzung_processing.sql',
            'processing_data/07_awjf_waldplan_grundstueck_04_waldflaeche_processing.sql',
            'processing_data/08_awjf_waldplan_grundstueck_05_flaechenberechnungen_processing.sql',
            'processing_data/09_awjf_waldplan_grundstueck_06_json_processing.sql',
            'processing_data/10_awjf_waldplan_auswertung_processing.sql'
        )
    }

    // --------------------------------------------------------
    // Export XTF
    // --------------------------------------------------------
    tasks.register("exportData_${bfs}", Ili2pgExport) {
        dependsOn "processingPubData_${bfs}"
        database = [dbUriProcessing, dbUserProcessing, dbPwdProcessing]
        dbschema = 'awjf_waldplan_pub_v2'
        models = 'SO_AWJF_Waldplan_Publikation_20250312'
        dataFile = xtfFile
        dataset = bfs.toString()
        disableValidation = true
        skipGeometryErrors = true
    }

    // --------------------------------------------------------
    // Validate
    // --------------------------------------------------------
    tasks.register("validateXTF_${bfs}", IliValidator) {
        dependsOn "exportData_${bfs}"
        dataFiles = xtfFile
    }

    // --------------------------------------------------------
    // Replace
    // --------------------------------------------------------
    tasks.register("replaceData_${bfs}", Ili2pgReplace) {
        dependsOn "validateXTF_${bfs}"
        database = [dbUriPub, dbUserPub, dbPwdPub]
        dbschema = 'awjf_waldplan_pub_v2'
        models = 'SO_AWJF_Waldplan_Publikation_20250312'
        dataFile = xtfFile
        dataset = bfs.toString()
        disableValidation = true
        skipGeometryErrors = true
    }

    // --------------------------------------------------------
    // Update TXT-Werte
    // --------------------------------------------------------
    tasks.register("updateTxtValues_${bfs}", SqlExecutor) {
        dependsOn "replaceData_${bfs}"
        database = [dbUriPub, dbUserPub, dbPwdPub]
        sqlParameters = [bfsnr_param: bfs.toString()]
        sqlFiles = files(
            'update_pubdata/awjf_waldplan_pub_waldfunktion_update.sql',
            'update_pubdata/awjf_waldplan_pub_waldnutzung_update.sql',
            'update_pubdata/awjf_waldplan_pub_waldeigentum_update.sql',
            'update_pubdata/awjf_waldplan_pub_schutzwald_update.sql'
        )
    }

    // --------------------------------------------------------
    // Abschluss-Task pro Gemeinde
    // --------------------------------------------------------
    tasks.register("transferData_${bfs}") {
        dependsOn "updateTxtValues_${bfs}"
    }
}

// ------------------------------------------------------------
// Sammel-Task
// ------------------------------------------------------------
tasks.register('transferAllGemeinden') {
    dependsOn {
        BfsNrGemeinden.collect { bfs ->
            tasks.named("transferData_${bfs}")
        }
    }
}